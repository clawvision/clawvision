<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawVision | رؤية المستقبل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #0a0a0a; color: white; overflow-x: hidden; }
        .hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; background: radial-gradient(circle at top, #1a1a1a, #000000); position: relative; }
        .glow { position: absolute; width: 500px; height: 500px; background: radial-gradient(circle, rgba(0,255,136,0.15) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); filter: blur(50px); }
        .content { z-index: 2; max-width: 800px; }
        h1 { font-size: 3.5rem; font-weight: 900; background: linear-gradient(90deg, #00ff88, #00aaff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
        p { font-size: 1.3rem; color: #b3b3b3; margin-bottom: 40px; line-height: 1.8; }
        .btn { display: inline-block; padding: 15px 35px; background: linear-gradient(90deg, #00ff88, #00aaff); color: #000; text-decoration: none; font-weight: 700; border-radius: 50px; transition: 0.3s; box-shadow: 0 0 30px rgba(0,255,136,0.3); }
        .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 80px; }
        .card { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .card h3 { color: #00ff88; margin-bottom: 10px; font-size: 1.4rem; }
        footer { text-align: center; padding: 30px; color: #666; border-top: 1px solid #1a1a1a; }
        @media (max-width: 600px) { h1 { font-size: 2.5rem; } p { font-size: 1.1rem; } }
    </style>
</head>
<body>
    <section class="hero">
        <div class="glow"></div>
        <div class="content">
            <h1>ClawVision 🚀</h1>
            <p>نبني المستقبل، سطر كود بسطر كود<br>هذا أول مشروع رسمي لـ كريم من Constantine</p>
            <a href="#features" class="btn">اكتشف المزيد</a>
            <div class="features" id="features">
                <div class="card"><h3>⚡ سريع</h3><p>مبني على Vercel بأسرع تقنيات الويب</p></div>
                <div class="card"><h3>📱 متجاوب</h3><p>يخدم على الهاتف والكمبيوتر بنفس الجودة</p></div>
                <div class="card"><h3>🔥 حديث</h3><p>تصميم 2026 بلمسة احترافية عصرية</p></div>
            </div>
        </div>
    </section>
    <footer><p>© 2026 ClawVision - صنع بـ 💚 في الجزائر</p></footer>
</body>
</html>
